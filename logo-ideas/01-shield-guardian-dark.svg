<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- RedMan Logo 1: Shield Guardian (Dark Variant) — protective shield with server rack lines -->
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c93d3d"/>
      <stop offset="50%" stop-color="#a31e1e"/>
      <stop offset="100%" stop-color="#5e1212"/>
    </linearGradient>
    <linearGradient id="shieldEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b1515"/>
      <stop offset="100%" stop-color="#3a0a0a"/>
    </linearGradient>
    <linearGradient id="innerSheen" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="serverBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0d0d0"/>
      <stop offset="100%" stop-color="#c4b0b0"/>
    </linearGradient>
    <filter id="innerShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="0" dy="2" result="offset"/>
      <feComposite in="offset" in2="SourceGraphic" operator="arithmetic" k2="-1" k3="1"/>
      <feFlood flood-color="#4a0e0e" flood-opacity="0.4"/>
      <feComposite in2="offset" operator="in"/>
      <feComposite in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>

  <!-- Shield outer edge / border -->
  <path d="M256 44 L440 120 L440 284 C440 388 344 464 256 488 C168 464 72 388 72 284 L72 120 Z"
        fill="url(#shieldEdge)"/>

  <!-- Shield main body -->
  <path d="M256 54 L430 126 L430 280 C430 380 338 452 256 476 C174 452 82 380 82 280 L82 126 Z"
        fill="url(#shieldGrad)"/>

  <!-- Inner highlight / sheen for 3D effect -->
  <path d="M256 54 L430 126 L430 280 C430 380 338 452 256 476 C174 452 82 380 82 280 L82 126 Z"
        fill="url(#innerSheen)"/>

  <!-- Unraid diamond symbol at top -->
  <g transform="translate(256,128)">
    <rect x="-18" y="-18" width="36" height="36" rx="4"
          transform="rotate(45)"
          fill="none" stroke="#e8d5d5" stroke-width="5" opacity="0.9"/>
    <rect x="-9" y="-9" width="18" height="18" rx="2"
          transform="rotate(45)"
          fill="#e8d5d5" opacity="0.25"/>
  </g>

  <!-- Server rack housing -->
  <g filter="url(#innerShadow)">
    <!-- Drive bay 1 -->
    <rect x="172" y="190" width="168" height="36" rx="6" fill="url(#serverBar)" opacity="0.88"/>
    <!-- Drive bay 2 -->
    <rect x="172" y="238" width="168" height="36" rx="6" fill="url(#serverBar)" opacity="0.88"/>
    <!-- Drive bay 3 -->
    <rect x="172" y="286" width="168" height="36" rx="6" fill="url(#serverBar)" opacity="0.88"/>
  </g>

  <!-- Drive detail lines (etched look) -->
  <rect x="190" y="204" width="96" height="3" rx="1.5" fill="#a31e1e" opacity="0.4"/>
  <rect x="190" y="210" width="68" height="2" rx="1" fill="#a31e1e" opacity="0.25"/>
  <rect x="190" y="252" width="80" height="3" rx="1.5" fill="#a31e1e" opacity="0.4"/>
  <rect x="190" y="258" width="52" height="2" rx="1" fill="#a31e1e" opacity="0.25"/>
  <rect x="190" y="300" width="64" height="3" rx="1.5" fill="#a31e1e" opacity="0.4"/>
  <rect x="190" y="306" width="44" height="2" rx="1" fill="#a31e1e" opacity="0.25"/>

  <!-- Drive indicator LEDs with glow -->
  <circle cx="320" cy="208" r="5.5" fill="#128a3a"/>
  <circle cx="320" cy="208" r="3" fill="#3bc06e" opacity="0.65"/>
  <circle cx="320" cy="256" r="5.5" fill="#128a3a"/>
  <circle cx="320" cy="256" r="3" fill="#3bc06e" opacity="0.65"/>
  <circle cx="320" cy="304" r="5.5" fill="#1d4fd4"/>
  <circle cx="320" cy="304" r="3" fill="#4b8de0" opacity="0.65"/>

  <!-- Connecting lines between diamond and server rack -->
  <line x1="256" y1="154" x2="256" y2="184" stroke="#e8d5d5" stroke-width="2.5" opacity="0.35" stroke-dasharray="4,4"/>
</svg>
